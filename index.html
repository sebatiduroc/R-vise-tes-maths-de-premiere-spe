<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Maths — Première Spé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
  chtml: { scale: 0.92, matchFontHeight: false, minScale: 0.5 },
  startup: {
    typeset: false,
    ready() {
      MathJax.startup.defaultReady();
      window._mathJaxReady = true;
      if (window._mathJaxCallback) window._mathJaxCallback();
    }
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
<style>
  :root {
    --ink: #1a1410; --paper: #f5f0e8; --accent: #c8401a;
    --accent-light: #e8602a; --muted: #7a6e60;
    --card-bg: #faf7f0; --shadow: rgba(26,20,16,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--paper);
    color: var(--ink); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(200,64,26,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(184,134,44,0.05) 0%, transparent 50%);
  }
  header {
    position: relative; z-index: 1; width: 100%; max-width: 900px;
    padding: 2rem 2rem 1rem;
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid rgba(26,20,16,0.12); margin-bottom: 1.8rem;
  }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; letter-spacing: -0.02em; }
  .header-title span { color: var(--accent); font-style: italic; }
  .header-meta { font-size: 0.78rem; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; text-transform: uppercase; }
  .category-bar {
    position: relative; z-index: 1; width: 100%; max-width: 900px;
    padding: 0 2rem; margin-bottom: 2rem; display: flex; flex-wrap: wrap; gap: 0.45rem;
  }
  .cat-btn {
    font-family: 'DM Mono', monospace; font-size: 0.69rem; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 0.3rem 0.8rem;
    border: 1px solid rgba(26,20,16,0.22); background: transparent;
    color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.15s;
  }
  .cat-btn:hover { color: var(--ink); border-color: var(--ink); }
  .cat-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .arena {
    position: relative; z-index: 1; width: 100%; max-width: 820px;
    padding: 0 2rem; display: flex; flex-direction: column; align-items: center;
  }
  .progress-row { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
  .progress-text { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); }
  .progress-bar-wrap { flex: 1; height: 3px; background: rgba(26,20,16,0.1); margin: 0 1.2rem; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .card-scene { perspective: 1200px; width: 100%; height: 360px; cursor: pointer; margin-bottom: 1.4rem; }
  .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 6px; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 8px 40px var(--shadow), 0 2px 8px rgba(26,20,16,0.08);
  }
  .card-front { background: var(--card-bg); border: 1px solid rgba(26,20,16,0.1); }
  .card-front-top {
    padding: 1.1rem 1.8rem 0.75rem; border-bottom: 1px solid rgba(26,20,16,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-label-recto { font-family: 'DM Mono', monospace; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .card-category-tag {
    font-family: 'DM Mono', monospace; font-size: 0.63rem; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--accent); border: 1px solid var(--accent);
    padding: 0.13rem 0.55rem; border-radius: 2px;
  }
  .card-front-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem 2.5rem; text-align: center;
  }
  .card-hint { font-family: 'DM Serif Display', serif; font-size: 1.4rem; line-height: 1.5; color: var(--ink); }
  .card-front-bottom { padding: 0.85rem 1.8rem; border-top: 1px solid rgba(26,20,16,0.06); display: flex; align-items: center; justify-content: space-between; }
  .card-instruction { font-size: 0.71rem; color: var(--muted); font-style: italic; }
  .timer-wrap { position: relative; width: 36px; height: 36px; }
  .timer-svg { transform: rotate(-90deg); width: 36px; height: 36px; }
  .timer-track { fill: none; stroke: rgba(26,20,16,0.1); stroke-width: 2.5; }
  .timer-arc { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 94.25; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .card-back { background: var(--ink); transform: rotateY(180deg); border: 1px solid rgba(255,255,255,0.05); }
  .card-back-top { padding: 1.1rem 1.8rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
  .card-label-verso { font-family: 'DM Mono', monospace; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); }
  .card-back-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.4rem 2.5rem; text-align: center; }
  .card-formula { color: #fff; font-size: 1.2rem; line-height: 1.9; }
  .card-back-bottom { padding: 0.85rem 1.8rem; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; }
  .assess-row {
    display: flex; gap: 0.8rem; justify-content: center; width: 100%; margin-bottom: 1.6rem;
    opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; pointer-events: none;
  }
  .assess-row.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .assess-btn { flex: 1; max-width: 180px; font-family: 'DM Mono', monospace; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em; padding: 0.7rem 1rem; border-radius: 3px; border: none; cursor: pointer; transition: all 0.15s; }
  .assess-ok { background: #2a6b3a; color: #fff; }
  .assess-ok:hover { background: #35844a; }
  .assess-miss { background: rgba(26,20,16,0.08); color: var(--muted); border: 1px solid rgba(26,20,16,0.15); }
  .assess-miss:hover { background: rgba(200,64,26,0.08); color: var(--accent); border-color: var(--accent); }
  .nav-row { display: flex; gap: 1rem; justify-content: center; width: 100%; margin-bottom: 1.8rem; }
  .nav-btn { font-family: 'DM Mono', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; padding: 0.6rem 1.5rem; border: 1px solid rgba(26,20,16,0.2); background: transparent; color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .nav-btn:hover { color: var(--ink); border-color: var(--ink); }
  .nav-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
  .stats-row { display: flex; gap: 2rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-bottom: 3rem; }
  .stats-ok { color: #2a6b3a; }
  .stats-miss { color: var(--accent); }
  .summary { display: none; flex-direction: column; align-items: center; text-align: center; padding: 3rem 2rem; width: 100%; max-width: 520px; }
  .summary.visible { display: flex; }
  .summary-title { font-family: 'DM Serif Display', serif; font-size: 2.2rem; margin-bottom: 0.5rem; }
  .summary-score { font-family: 'DM Mono', monospace; font-size: 3.5rem; color: var(--accent); margin: 1rem 0; letter-spacing: -0.02em; }
  .summary-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }
  @keyframes cardIn { from { opacity:0; transform: translateY(12px) scale(0.98); } to { opacity:1; transform: translateY(0) scale(1); } }
  .card-scene.entering { animation: cardIn 0.35s ease; }

  /* ── Responsive mobile ── */
  .card-hint { overflow-x: auto; max-width: 100%; }
  .card-formula { overflow-x: auto; max-width: 100%; }
  mjx-container { max-width: 100%; overflow-x: auto; overflow-y: hidden; }
  @media (max-width: 480px) {
    header { padding: 1rem 1rem 0.75rem; }
    .header-title { font-size: 1.15rem; }
    .category-bar { padding: 0 0.8rem; }
    .arena { padding: 0 0.8rem; }
    .card-scene { height: 320px; }
    .card-front-body { padding: 1.2rem 1rem; }
    .card-back-body { padding: 1rem; }
    .card-hint { font-size: 1.05rem; line-height: 1.4; }
    .card-formula { font-size: 0.95rem; line-height: 1.6; }
    .card-front-top, .card-back-top { padding: 0.75rem 1rem 0.5rem; }
    .card-front-bottom { padding: 0.6rem 1rem; }
    .assess-btn { font-size: 0.7rem; padding: 0.6rem 0.6rem; }
    .nav-btn { padding: 0.5rem 0.9rem; font-size: 0.68rem; }
    .stats-row { gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">Flashcards <span>Maths</span></div>
  <div class="header-meta">Première · Spécialité · Programme officiel BO</div>
</header>

<div class="category-bar" id="catBar"></div>

<div class="arena" id="mainArena">
  <div class="progress-row">
    <span class="progress-text" id="progressLabel">1 / 1</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-text" id="deckLabel">TOUTES</span>
  </div>

  <div class="card-scene" id="cardScene">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-front-top">
          <span class="card-label-recto">Recto · Indice</span><span class="card-num" id="cardNum" style="font-family:'DM Mono',monospace;font-size:0.66rem;color:var(--muted);margin-left:0.4rem"></span>
          <span class="card-category-tag" id="catTag">—</span>
        </div>
        <div class="card-front-body"><div class="card-hint" id="hintText">Chargement…</div></div>
        <div class="card-front-bottom">
          <span class="card-instruction">Écris la formule sur papier, puis clique pour vérifier</span>
          <div class="timer-wrap">
            <svg class="timer-svg" viewBox="0 0 36 36">
              <circle class="timer-track" cx="18" cy="18" r="15"/>
              <circle class="timer-arc" id="timerArc" cx="18" cy="18" r="15"/>
            </svg>
            <div class="timer-num" id="timerNum">20</div>
          </div>
        </div>
      </div>
      <div class="card-face card-back">
        <div class="card-back-top">
          <span class="card-label-verso">Verso · Formule attendue</span><span class="card-num-back" id="cardNumBack" style="font-family:'DM Mono',monospace;font-size:0.66rem;color:rgba(255,255,255,0.35);margin-left:0.4rem"></span>
          <span class="card-category-tag" style="color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.2)" id="catTagBack">—</span>
        </div>
        <div class="card-back-body"><div class="card-formula" id="formulaText">…</div></div>
        <div class="card-back-bottom">
          <span style="font-size:0.68rem;color:rgba(255,255,255,0.3);font-family:'DM Mono',monospace">← cliquer pour revenir au recto</span>
        </div>
      </div>
    </div>
  </div>

  <div class="assess-row" id="assessRow">
    <button class="assess-btn assess-ok" onclick="assess(true)">✓ Je savais</button>
    <button class="assess-btn assess-miss" onclick="assess(false)">✗ À revoir</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevCard()">← Précédente</button>
    <button class="nav-btn nav-btn-primary" onclick="nextCard()">Suivante →</button>
    <button class="nav-btn" onclick="shuffleDeck()">⇄ Mélanger</button>
  </div>

  <div class="stats-row">
    <span>Total : <strong id="statTotal">0</strong></span>
    <span class="stats-ok">✓ Sues : <strong id="statOk">0</strong></span>
    <span class="stats-miss">✗ À revoir : <strong id="statMiss">0</strong></span>
  </div>
</div>

<div class="summary arena" id="summaryScreen">
  <div class="summary-title">Session terminée !</div>
  <div class="summary-score" id="summaryScore">—</div>
  <div class="summary-sub" id="summarySub"></div>
  <button class="nav-btn nav-btn-primary" onclick="restart()" style="margin-bottom:0.8rem">Recommencer (toutes)</button>
  <button class="nav-btn" onclick="restartMiss()">Rejouer ce paquet mélangé</button>
</div>

<script>
const ALL_CARDS = [
  // SUITES
  {cat:"Suites", hint:"Terme général d'une suite arithmétique de raison \\(r\\) et de premier terme \\(u_0\\)", formula:"\\( u_n = u_0 + n\\,r \\)"},
  {cat:"Suites", hint:"Terme général d'une suite arithmétique à partir de \\(u_p\\)", formula:"\\( u_n = u_p + (n-p)\\,r \\)"},
  {cat:"Suites", hint:"Sens de variation d'une suite arithmétique selon le signe de \\(r\\)", formula:"\\( r>0\\Rightarrow\\text{croissante} \\\\[4pt] r<0\\Rightarrow\\text{décroissante} \\\\[4pt] r=0\\Rightarrow\\text{constante} \\)"},
  {cat:"Suites", hint:"Somme des \\(n+1\\) premiers termes d'une suite arithmétique", formula:"\\( u_0+u_1+\\cdots+u_n = \\dfrac{(n+1)(u_0+u_n)}{2} \\)"},
  {cat:"Suites", hint:"Somme \\(1 + 2 + \\cdots + n\\)", formula:"\\( 1+2+\\cdots+n = \\dfrac{n(n+1)}{2} \\)"},
  {cat:"Suites", hint:"Terme général d'une suite géométrique de raison \\(q\\) et de premier terme \\(u_0\\)", formula:"\\( u_n = u_0\\cdot q^n \\)"},
  {cat:"Suites", hint:"Terme général d'une suite géométrique à partir de \\(u_p\\)", formula:"\\( u_n = u_p\\cdot q^{n-p} \\)"},
  {cat:"Suites", hint:"Sens de variation d'une suite géométrique à termes positifs", formula:"\\( q>1\\Rightarrow\\text{croissante} \\\\[4pt] 0<q<1\\Rightarrow\\text{décroissante} \\\\[4pt] q=1\\Rightarrow\\text{constante} \\)"},
  {cat:"Suites", hint:"Somme \\(1 + q + q^2 + \\cdots + q^n\\) (\\(q\\neq 1\\))", formula:"\\( 1+q+\\cdots+q^n = \\dfrac{1-q^{n+1}}{1-q} \\)"},
  {cat:"Suites", hint:"Somme des \\(n+1\\) premiers termes d'une suite géométrique (\\(q\\neq 1\\))", formula:"\\( u_0+u_1+\\cdots+u_n = u_0\\cdot\\dfrac{1-q^{n+1}}{1-q} \\)"},
  // SECOND DEGRÉ
  {cat:"Second degré", hint:"Discriminant \\(\\Delta\\) du trinôme \\(ax^2+bx+c\\)", formula:"\\( \\Delta = b^2 - 4ac \\)"},
  {cat:"Second degré", hint:"Nombre de racines réelles selon le signe de \\(\\Delta\\)", formula:"\\( \\Delta>0\\Rightarrow 2\\text{ racines}\\quad\\Delta=0\\Rightarrow 1\\quad\\Delta<0\\Rightarrow 0 \\)"},
  {cat:"Second degré", hint:"Racines du trinôme si \\(\\Delta > 0\\)", formula:"\\( x_1=\\dfrac{-b-\\sqrt{\\Delta}}{2a}\\qquad x_2=\\dfrac{-b+\\sqrt{\\Delta}}{2a} \\)"},
  {cat:"Second degré", hint:"Racine double si \\(\\Delta = 0\\)", formula:"\\( x_0 = -\\dfrac{b}{2a} \\)"},
  {cat:"Second degré", hint:"Factorisation du trinôme si \\(\\Delta > 0\\)", formula:"\\( ax^2+bx+c = a(x-x_1)(x-x_2) \\)"},
  {cat:"Second degré", hint:"Relations de Viète : somme et produit des racines", formula:"\\( x_1+x_2 = -\\dfrac{b}{a}\\qquad x_1 x_2 = \\dfrac{c}{a} \\)"},
  {cat:"Second degré", hint:"Forme canonique du trinôme et abscisse du sommet", formula:"\\( ax^2+bx+c = a\\!\\left(x+\\dfrac{b}{2a}\\right)^{\\!2}-\\dfrac{\\Delta}{4a}\\quad x_S=-\\dfrac{b}{2a} \\)"},
  {cat:"Second degré", hint:"Signe de \\(ax^2+bx+c\\) lorsque \\(\\Delta>0\\) avec \\(x_1<x_2\\)", formula:"\\( \\text{Signe opposé à }a\\text{ sur }\\mathopen]x_1,x_2\\mathclose[\\text{, signe de }a\\text{ en dehors} \\)"},
  // DÉRIVÉES
  {cat:"Dérivées", hint:"Taux de variation de \\(f\\) entre \\(a\\) et \\(a+h\\)", formula:"\\( \\tau = \\dfrac{f(a+h)-f(a)}{h} \\)"},
  {cat:"Dérivées", hint:"Équation de la tangente à \\(\\mathcal{C}_f\\) au point d'abscisse \\(a\\)", formula:"\\( y = f'(a)(x-a)+f(a) \\)"},
  {cat:"Dérivées", hint:"Dérivée d'une constante \\(k\\)", formula:"\\( (k)'=0 \\)"},
  {cat:"Dérivées", hint:"Dérivée de \\(x^n\\) pour \\(n\\in\\mathbb{Z}\\)", formula:"\\( (x^n)'=n\\,x^{n-1} \\)"},
  {cat:"Dérivées", hint:"Dérivée de \\(\\sqrt{x}\\)", formula:"\\( (\\sqrt{x})'=\\dfrac{1}{2\\sqrt{x}}\\quad(x>0) \\)"},
  {cat:"Dérivées", hint:"Dérivée de \\(\\dfrac{1}{x}\\)", formula:"\\( \\left(\\dfrac{1}{x}\\right)'=-\\dfrac{1}{x^2} \\)"},
  {cat:"Dérivées", hint:"Dérivée de \\(x^2\\)", formula:"\\( (x^2)'=2x \\)"},
  {cat:"Dérivées", hint:"Dérivée de \\(x^3\\)", formula:"\\( (x^3)'=3x^2 \\)"},
  {cat:"Dérivées", hint:"Dérivée de la somme \\(u+v\\)", formula:"\\( (u+v)'=u'+v' \\)"},
  {cat:"Dérivées", hint:"Dérivée du produit \\(u\\times v\\)", formula:"\\( (uv)'=u'v+uv' \\)"},
  {cat:"Dérivées", hint:"Dérivée du quotient \\(\\dfrac{u}{v}\\)", formula:"\\( \\left(\\dfrac{u}{v}\\right)'=\\dfrac{u'v-uv'}{v^2} \\)"},
  {cat:"Dérivées", hint:"Dérivée de \\(k\\,u\\) (\\(k\\) constante)", formula:"\\( (ku)'=k\\,u' \\)"},
  {cat:"Dérivées", hint:"Lien entre le signe de \\(f'\\) et le sens de variation de \\(f\\)", formula:"\\( f'>0\\Rightarrow f\\text{ croissante}\\quad f'<0\\Rightarrow f\\text{ décroissante}\\quad f'=0\\Rightarrow f\\text{ constante} \\)"},
  {cat:"Dérivées", hint:"Nombre dérivé en un extremum local", formula:"\\( f\\text{ admet un extremum en }a\\Rightarrow f'(a)=0 \\)"},
  {cat:"Exponentielle", hint:"\\(e^0\\) et \\(e^1\\)", formula:"\\( e^0=1\\qquad e^1=e \\)"},
  {cat:"Exponentielle", hint:"\\(e^{x+y}\\) = ?", formula:"\\( e^{x+y}=e^x\\cdot e^y \\)"},
  {cat:"Exponentielle", hint:"\\(e^x\\cdot e^{-x}\\)", formula:"\\( e^x\\cdot e^{-x}=1 \\)"},
  {cat:"Exponentielle", hint:"\\(e^{x-y}\\) = ?", formula:"\\( e^{x-y}=\\dfrac{e^x}{e^y} \\)"},
  {cat:"Exponentielle", hint:"\\((e^x)^n\\) pour \\(n\\in\\mathbb{Z}\\)", formula:"\\( (e^x)^n=e^{nx} \\)"},
  {cat:"Exponentielle", hint:"Dérivée de \\(e^x\\)", formula:"\\( (e^x)'=e^x \\)"},
  {cat:"Exponentielle", hint:"Signe de \\(e^x\\) pour tout réel \\(x\\)", formula:"\\( e^x>0\\quad\\forall x\\in\\mathbb{R} \\)"},
  {cat:"Exponentielle", hint:"Sens de variation de \\(x\\mapsto e^x\\)", formula:"\\( x\\mapsto e^x\\text{ strictement croissante sur }\\mathbb{R} \\)"},
  {cat:"Exponentielle", hint:"Limite de \\(e^x\\) en \\(+\\infty\\) et en \\(-\\infty\\)", formula:"\\( \\lim_{x\\to+\\infty}e^x=+\\infty\\qquad\\lim_{x\\to-\\infty}e^x=0 \\)"},
  // TRIGONOMÉTRIE
  {cat:"Trigonométrie", hint:"Relation fondamentale entre \\(\\cos x\\) et \\(\\sin x\\)", formula:"\\( \\cos^2 x+\\sin^2 x=1 \\)"},
  {cat:"Trigonométrie", hint:"Valeurs remarquables en \\(0\\)", formula:"\\( \\cos 0=1\\qquad\\sin 0=0 \\)"},
  {cat:"Trigonométrie", hint:"Valeurs remarquables en \\(\\dfrac{\\pi}{6}\\)", formula:"\\( \\cos\\dfrac{\\pi}{6}=\\dfrac{\\sqrt{3}}{2}\\qquad\\sin\\dfrac{\\pi}{6}=\\dfrac{1}{2} \\)"},
  {cat:"Trigonométrie", hint:"Valeurs remarquables en \\(\\dfrac{\\pi}{4}\\)", formula:"\\( \\cos\\dfrac{\\pi}{4}=\\dfrac{\\sqrt{2}}{2}\\qquad\\sin\\dfrac{\\pi}{4}=\\dfrac{\\sqrt{2}}{2} \\)"},
  {cat:"Trigonométrie", hint:"Valeurs remarquables en \\(\\dfrac{\\pi}{3}\\)", formula:"\\( \\cos\\dfrac{\\pi}{3}=\\dfrac{1}{2} \\\\[8pt] \\sin\\dfrac{\\pi}{3}=\\dfrac{\\sqrt{3}}{2} \\)"},
  {cat:"Trigonométrie", hint:"Valeurs remarquables en \\(\\dfrac{\\pi}{2}\\)", formula:"\\( \\cos\\dfrac{\\pi}{2}=0 \\\\[8pt] \\sin\\dfrac{\\pi}{2}=1 \\)"},
  {cat:"Trigonométrie", hint:"Valeurs remarquables en \\(\\pi\\)", formula:"\\( \\cos\\pi=-1\\qquad\\sin\\pi=0 \\)"},
  {cat:"Trigonométrie", hint:"Parité de cosinus et de sinus", formula:"\\( \\cos(-x)=\\cos x\\text{ (paire)}\\qquad\\sin(-x)=-\\sin x\\text{ (impaire)} \\)"},
  {cat:"Trigonométrie", hint:"Période de cos et sin", formula:"\\( \\cos(x+2\\pi)=\\cos x\\qquad\\sin(x+2\\pi)=\\sin x\\quad(\\text{période }2\\pi) \\)"},
  {cat:"Trigonométrie", hint:"Cosinus et sinus de \\(x+\\pi\\)", formula:"\\( \\cos(x+\\pi)=-\\cos x\\qquad\\sin(x+\\pi)=-\\sin x \\)"},
  {cat:"Trigonométrie", hint:"Cosinus et sinus de \\(\\pi-x\\)", formula:"\\( \\cos(\\pi-x)=-\\cos x\\qquad\\sin(\\pi-x)=\\sin x \\)"},
  {cat:"Trigonométrie", hint:"Dérivée de \\(\\cos x\\) et de \\(\\sin x\\)", formula:"\\( (\\cos x)'=-\\sin x\\qquad(\\sin x)'=\\cos x \\)"},
  {cat:"Trigonométrie", hint:"Conversion d'un angle en degrés vers les radians", formula:"\\( \\theta_{\\text{rad}}=\\theta°\\times\\dfrac{\\pi}{180} \\)"},
  // PRODUIT SCALAIRE
  {cat:"Produit scalaire", hint:"Produit scalaire \\(\\vec{u}\\cdot\\vec{v}\\) via l'angle", formula:"\\( \\vec{u}\\cdot\\vec{v}=\\|\\vec{u}\\|\\,\\|\\vec{v}\\|\\cos\\widehat{(\\vec{u},\\vec{v})} \\)"},
  {cat:"Produit scalaire", hint:"Produit scalaire en repère orthonormé (coordonnées)", formula:"\\( \\vec{u}\\cdot\\vec{v}=x_u x_v+y_u y_v \\)"},
  {cat:"Produit scalaire", hint:"Norme d'un vecteur \\(\\vec{u}(x,y)\\) en repère orthonormé", formula:"\\( \\|\\vec{u}\\|=\\sqrt{x^2+y^2} \\)"},
  {cat:"Produit scalaire", hint:"Critère d'orthogonalité de deux vecteurs", formula:"\\( \\vec{u}\\perp\\vec{v}\\iff\\vec{u}\\cdot\\vec{v}=0 \\)"},
  {cat:"Produit scalaire", hint:"Développement de \\(\\|\\vec{u}+\\vec{v}\\|^2\\)", formula:"\\( \\|\\vec{u}+\\vec{v}\\|^2=\\|\\vec{u}\\|^2+2\\,\\vec{u}\\cdot\\vec{v}+\\|\\vec{v}\\|^2 \\)"},
  {cat:"Produit scalaire", hint:"Développement de \\(\\|\\vec{u}-\\vec{v}\\|^2\\)", formula:"\\( \\|\\vec{u}-\\vec{v}\\|^2=\\|\\vec{u}\\|^2-2\\,\\vec{u}\\cdot\\vec{v}+\\|\\vec{v}\\|^2 \\)"},
  {cat:"Produit scalaire", hint:"Identité \\((\\vec{u}+\\vec{v})\\cdot(\\vec{u}-\\vec{v})\\)", formula:"\\( (\\vec{u}+\\vec{v})\\cdot(\\vec{u}-\\vec{v})=\\|\\vec{u}\\|^2-\\|\\vec{v}\\|^2 \\)"},
  {cat:"Produit scalaire", hint:"Formule d'Al-Kashi", formula:"\\( BC^2=AB^2+AC^2-2\\,AB\\cdot AC\\cdot\\cos\\widehat{A} \\)"},
  {cat:"Produit scalaire", hint:"Caractérisation du cercle de diamètre \\([AB]\\) via le produit scalaire", formula:"\\( \\overrightarrow{MA}\\cdot\\overrightarrow{MB}=0 \\\\[6pt] \\iff M\\text{ est sur le cercle de diamètre }[AB] \\)"},
  // GÉOMÉTRIE REPÉRÉE
  {cat:"Géométrie repérée", hint:"Vecteur normal et vecteur directeur de la droite \\(ax+by+c=0\\)", formula:"\\( \\vec{n}(a\\,;b)\\text{ normal}\\qquad\\vec{d}(-b\\,;a)\\text{ directeur} \\)"},
  {cat:"Géométrie repérée", hint:"Équation cartésienne d'une droite connaissant un point \\(A(x_A,y_A)\\) et un vecteur normal \\(\\vec{n}(a,b)\\)", formula:"\\( a(x-x_A)+b(y-y_A)=0 \\)"},
  {cat:"Géométrie repérée", hint:"Équation d'un cercle de centre \\(\\Omega(a,b)\\) et de rayon \\(r\\)", formula:"\\( (x-a)^2+(y-b)^2=r^2 \\)"},
  {cat:"Géométrie repérée", hint:"Distance entre deux points \\(A(x_A,y_A)\\) et \\(B(x_B,y_B)\\)", formula:"\\( AB=\\sqrt{(x_B-x_A)^2+(y_B-y_A)^2} \\)"},
  {cat:"Géométrie repérée", hint:"Coordonnées du milieu \\(I\\) de \\([AB]\\)", formula:"\\( I=\\left(\\dfrac{x_A+x_B}{2}\\,;\\,\\dfrac{y_A+y_B}{2}\\right) \\)"},
  {cat:"Géométrie repérée", hint:"Axe de symétrie et sommet d'une parabole \\(y=ax^2+bx+c\\)", formula:"\\( \\text{Axe : }x=-\\dfrac{b}{2a}\\qquad\\text{Sommet : }S\\!\\left(-\\dfrac{b}{2a}\\,;\\,-\\dfrac{\\Delta}{4a}\\right) \\)"},
  // PROBABILITÉS CONDITIONNELLES
  {cat:"Probabilités", hint:"Définition de la probabilité conditionnelle \\(P_A(B)\\)", formula:"\\( P_A(B)=\\dfrac{P(A\\cap B)}{P(A)}\\quad(P(A)>0) \\)"},
  {cat:"Probabilités", hint:"Règle du produit : \\(P(A\\cap B)\\) via un arbre pondéré", formula:"\\( P(A\\cap B)=P(A)\\cdot P_A(B) \\)"},
  {cat:"Probabilités", hint:"Probabilité du complémentaire \\(P(\\bar{A})\\)", formula:"\\( P(\\bar{A})=1-P(A) \\)"},
  {cat:"Probabilités", hint:"Probabilité de la réunion \\(P(A\\cup B)\\)", formula:"\\( P(A\\cup B)=P(A)+P(B)-P(A\\cap B) \\)"},
  {cat:"Probabilités", hint:"Définition de l'indépendance de deux événements", formula:"\\( A\\text{ et }B\\text{ indépendants} \\\\[6pt] \\iff P(A\\cap B)=P(A)\\cdot P(B) \\)"},
  // VARIABLES ALÉATOIRES
  {cat:"Variables aléatoires", hint:"Espérance d'une variable aléatoire \\(X\\) discrète finie", formula:"\\( E(X)=\\sum_i x_i\\,p_i \\)"},
  {cat:"Variables aléatoires", hint:"Variance de \\(X\\) — formule de König-Huygens", formula:"\\( V(X)=E(X^2)-[E(X)]^2 \\)"},
  {cat:"Variables aléatoires", hint:"Variance de \\(X\\) — définition directe", formula:"\\( V(X)=\\sum_i(x_i-E(X))^2\\,p_i \\)"},
  {cat:"Variables aléatoires", hint:"\\(E(X^2)\\) : comment le calcule-t-on ?", formula:"\\( E(X^2)=\\sum_i x_i^2\\,p_i \\)"},
  {cat:"Variables aléatoires", hint:"Écart-type de \\(X\\)", formula:"\\( \\sigma(X)=\\sqrt{V(X)} \\)"},
];

const CATS = ['Toutes', ...new Set(ALL_CARDS.map(c => c.cat))];
let activeCat = 'Toutes', deck = [], idx = 0;
let isFlipped = false, timerInterval = null, timerSec = 20;
let statsOk = 0, statsMiss = 0, assessed = false;

function buildCatBar() {
  const bar = document.getElementById('catBar'); bar.innerHTML = '';
  CATS.forEach(cat => {
    const count = cat==='Toutes' ? ALL_CARDS.length : ALL_CARDS.filter(c=>c.cat===cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn'+(cat===activeCat?' active':'');
    btn.textContent = cat+' ('+count+')';
    btn.onclick = () => {
      activeCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      statsOk=0; statsMiss=0; buildDeck();
    };
    bar.appendChild(btn);
  });
}

function buildDeck() {
  deck = activeCat==='Toutes' ? [...ALL_CARDS] : ALL_CARDS.filter(c=>c.cat===activeCat);
  shuffle(deck); idx=0; isFlipped=false; assessed=false;
  document.getElementById('summaryScreen').classList.remove('visible');
  document.getElementById('mainArena').style.display='flex';
  loadCard();
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function loadCard() {
  if (idx>=deck.length) { showSummary(); return; }
  const c = deck[idx];
  document.getElementById('hintText').innerHTML = c.hint;
  document.getElementById('formulaText').innerHTML = c.formula;
  document.getElementById('catTag').textContent = c.cat;
  document.getElementById('catTagBack').textContent = c.cat;
  const globalNum = ALL_CARDS.indexOf(c) + 1;
  document.getElementById('cardNum').textContent = '#' + globalNum;
  document.getElementById('cardNumBack').textContent = '#' + globalNum;
  document.getElementById('deckLabel').textContent = activeCat.toUpperCase();
  isFlipped=false; assessed=false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('assessRow').classList.remove('visible');
  const scene=document.getElementById('cardScene');
  scene.classList.remove('entering'); void scene.offsetWidth; scene.classList.add('entering');
  document.getElementById('progressFill').style.width=(idx/deck.length*100)+'%';
  document.getElementById('progressLabel').textContent=(idx+1)+' / '+deck.length;
  updateStats();
  if (window.MathJax && MathJax.typesetPromise) {
    const els = [document.getElementById('hintText'), document.getElementById('formulaText')];
    MathJax.typesetClear(els);
    MathJax.typesetPromise(els).catch(() => {});
  }
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval); timerSec=20; updateTimerDisplay();
  timerInterval = setInterval(()=>{timerSec--;updateTimerDisplay();if(timerSec<=0){clearInterval(timerInterval);flipCard();}},1000);
}
function updateTimerDisplay() {
  document.getElementById('timerArc').style.strokeDashoffset = 94.25*(1-timerSec/20);
  document.getElementById('timerArc').style.stroke = timerSec<=5?'#e8602a':'var(--accent)';
  document.getElementById('timerNum').textContent = timerSec;
}
function flipCard() {
  clearInterval(timerInterval);
  if (isFlipped) {
    isFlipped=false; document.getElementById('cardInner').classList.remove('flipped');
    document.getElementById('assessRow').classList.remove('visible'); return;
  }
  isFlipped=true; document.getElementById('cardInner').classList.add('flipped');
  if (!assessed) setTimeout(()=>document.getElementById('assessRow').classList.add('visible'),420);
}
document.getElementById('cardScene').addEventListener('click', flipCard);

function assess(ok) {
  if (assessed) return; assessed=true;
  if (ok) statsOk++; else statsMiss++;
  document.getElementById('assessRow').classList.remove('visible');
  setTimeout(nextCard,280);
}
function nextCard() { clearInterval(timerInterval); idx++; loadCard(); }
function prevCard() { clearInterval(timerInterval); if(idx>0)idx--; loadCard(); }
function shuffleDeck() { clearInterval(timerInterval); shuffle(deck); idx=0; loadCard(); }
function updateStats() {
  document.getElementById('statTotal').textContent=deck.length;
  document.getElementById('statOk').textContent=statsOk;
  document.getElementById('statMiss').textContent=statsMiss;
}
function showSummary() {
  clearInterval(timerInterval);
  document.getElementById('mainArena').style.display='none';
  document.getElementById('summaryScreen').classList.add('visible');
  const pct=deck.length>0?Math.round(statsOk/deck.length*100):0;
  document.getElementById('summaryScore').textContent=statsOk+' / '+deck.length;
  document.getElementById('summarySub').innerHTML='Score : <strong>'+pct+'%</strong><br>'+(pct>=80?'🎉 Excellent — continue !':pct>=50?'👍 Bien, tu progresses.':'📚 Encore quelques révisions et ça viendra !');
}
function restart() { statsOk=0; statsMiss=0; buildDeck(); }
function restartMiss() {
  statsOk=0; statsMiss=0; shuffle(deck); idx=0;
  document.getElementById('summaryScreen').classList.remove('visible');
  document.getElementById('mainArena').style.display='flex';
  loadCard();
}
buildCatBar();
if (window._mathJaxReady) {
  buildDeck();
} else {
  window._mathJaxCallback = buildDeck;
  // Fallback : si MathJax ne se charge pas en 6s, on lance quand même
  setTimeout(() => { if (!window._mathJaxReady) buildDeck(); }, 6000);
}
</script>
</body>
</html>
